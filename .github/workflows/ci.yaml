name: CI

on:
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install flake8

      - name: Run linter
        run: |
          flake8 .

      - name: Run tests
        run: |
          #Pruebas blackjack
          python -m unittest discover -s blackjack -t blackjack
          #Aqui agregan pruebas de cada juego
